<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads / CRM — Clube Investvida</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{colors:{navy:"#003461",navy2:"#004B87",orange:"#FF6B00",ink:"#1A1C1E",line:"#E2E8F0",surface:"#F4F7F9"},fontFamily:{head:["Manrope"],body:["Inter"]}}}}</script>
<style>
 body{font-family:"Inter",sans-serif;background:#F4F7F9;color:#1A1C1E}.font-head{font-family:"Manrope",sans-serif}
 .nav a{display:flex;gap:.6rem;align-items:center;padding:.55rem .75rem;border-radius:.5rem;font-size:.9rem;color:#cbd5e1}
 .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
 .nav a.on{background:rgba(255,255,255,.10);color:#fff;font-weight:600;box-shadow:inset 3px 0 0 #FF6B00}
 .card{background:#fff;border:1px solid #E2E8F0;border-radius:.75rem}
 .chip{font-size:.66rem;font-weight:600;padding:.1rem .45rem;border-radius:999px}
 .inp{border:1px solid #E2E8F0;border-radius:.5rem;padding:.5rem .7rem;font-size:.9rem;background:#fff}
</style>
<style>.col{min-width:230px;width:230px}.lead{background:#fff;border:1px solid #E2E8F0;border-radius:.6rem;padding:.7rem;cursor:grab}</style>
</head><body>
<div class="flex min-h-screen">
  <aside class="w-60 bg-navy text-white flex-col hidden md:flex">
    <div class="px-5 py-4 flex items-center gap-3 border-b border-white/10">
      <div class="w-9 h-9 rounded-md bg-orange flex items-center justify-center font-head font-bold">CI</div>
      <div><div class="font-head font-bold leading-none">Clube Investvida</div>
      <div class="text-[11px] text-blue-200 mt-1">Seguros de Pessoas</div></div>
    </div>
    <nav class="nav p-3 space-y-1 flex-1">
      <a href="dashboard.html" data-k="dash"><span>▦</span> Dashboard</a>
      <a href="clientes.html" data-k="cli"><span>◉</span> Clientes</a>
      <a href="apolice-pessoas.html" data-k="apo"><span>❤</span> Apólices</a>
      <a href="leads.html" data-k="leads"><span>◔</span> Leads / CRM</a>
      <a href="financeiro.html" data-k="fin"><span>$</span> Financeiro</a>
      <a href="cofre.html" data-k="cofre"><span>⛁</span> Cofre Digital</a>
      <a href="configuracoes.html" data-k="cfg"><span>⚙</span> Configurações</a>
    </nav>
    <div class="p-3 border-t border-white/10 text-[11px] text-blue-200">v0 · protótipo</div>
  </aside>
  <div class="flex-1 flex flex-col">
    <header class="bg-white border-b border-line px-5 py-3 flex items-center gap-4">
      <input class="inp flex-1 max-w-md" placeholder="Buscar lead…">
      <button class="ml-auto bg-white border border-line px-3 py-2 rounded-md text-sm font-semibold flex items-center gap-2">
        <span class="text-orange">⟳</span> Importar Google Contatos</button>
      <button class="bg-navy text-white px-4 py-2 rounded-md text-sm font-semibold">+ Novo lead</button>
    </header>
    <main class="p-5">
      <div class="flex items-end justify-between flex-wrap gap-3 mb-4">
        <div><h1 class="text-2xl font-head font-bold text-navy">Funil de Leads</h1>
          <p class="text-sm text-slate-500">Da captação ao fechamento — com qualificação automática (ICP).</p></div>
        <div class="flex gap-3 text-center">
          <div class="card px-4 py-2"><div class="text-xs text-slate-500">Conversão</div><div class="font-head font-bold text-navy">4,2%</div></div>
          <div class="card px-4 py-2"><div class="text-xs text-slate-500">Novos (hoje)</div><div class="font-head font-bold text-navy">24</div></div>
          <div class="card px-4 py-2"><div class="text-xs text-slate-500">Em proposta</div><div class="font-head font-bold text-navy">R$ 1,2M</div></div>
        </div>
      </div>
      <div class="flex gap-4 overflow-x-auto pb-4" id="board"></div>
    </main>
  </div>
</div>
<script>
document.querySelectorAll('.nav a').forEach(a=>{if(a.dataset.k==='leads')a.classList.add('on')});
const scoreCor={Quente:'bg-red-100 text-red-700',Morno:'bg-amber-100 text-amber-700',Frio:'bg-sky-100 text-sky-700'};
const fonteCor='bg-slate-100 text-slate-600';
const etapas=[
 {t:'Novos',cor:'#94a3b8',leads:[
   {n:'Ricardo Mendonça',f:'Landing Page',r:'Vida',s:'Quente'},
   {n:'Ana Silva',f:'Orgânico',r:'Previdência',s:'Morno'}]},
 {t:'Qualificados',cor:'#004B87',leads:[
   {n:'Marcelo Batista',f:'Instagram',r:'Saúde',s:'Quente'},
   {n:'Júlia Prado',f:'Indicação',r:'Vida',s:'Morno'}]},
 {t:'Proposta',cor:'#7c3aed',leads:[
   {n:'Fernanda Reis',f:'Indicação',r:'Previdência',s:'Quente'}]},
 {t:'Fechados',cor:'#1E7A3D',leads:[
   {n:'Paulo Henrique',f:'Landing Page',r:'Vida',s:'Quente'}]},
 {t:'Perdidos',cor:'#B3261E',leads:[
   {n:'Lista fria 03',f:'Lista',r:'—',s:'Frio'}]},
];
document.getElementById('board').innerHTML=etapas.map(e=>`
 <div class="col">
  <div class="flex items-center justify-between mb-2">
    <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full" style="background:${e.cor}"></span>
      <span class="font-head font-semibold text-sm">${e.t}</span></div>
    <span class="chip bg-slate-100 text-slate-500">${e.leads.length}</span></div>
  <div class="space-y-2">${e.leads.map(l=>`
    <div class="lead">
      <div class="flex items-center justify-between">
        <span class="font-medium text-sm">${l.n}</span>
        <span class="chip ${scoreCor[l.s]}">${l.s}</span></div>
      <div class="text-xs text-slate-400 mt-1">${l.f}</div>
      <div class="mt-2 flex items-center justify-between">
        <span class="chip bg-blue-50 text-navy2">${l.r}</span>
        <div class="flex gap-1 text-slate-400 text-xs"><span>📞</span><span>✉</span><span>⋯</span></div></div>
    </div>`).join('')}</div>
 </div>`).join('');
</script>
</body></html>
